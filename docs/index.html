<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="description" content="Nexus — an interactive 3D particle experience that reacts to touch and mouse.">
  <title>Nexus | Interactive 3D Experience</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
</head>
<body>
  <canvas id="canvas" aria-label="Interactive 3D particle visualization"></canvas>

  <div class="grain" aria-hidden="true"></div>
  <div class="vignette" aria-hidden="true"></div>

  <header class="hud">
    <div class="brand">
      <span class="brand-mark" aria-hidden="true"></span>
      <div>
        <h1>Nexus</h1>
        <p class="tagline">Touch the void. Shape the light.</p>
      </div>
    </div>
    <div class="stats" aria-live="polite">
      <div class="stat">
        <span class="stat-label">Touches</span>
        <span class="stat-value" id="touch-count">0</span>
      </div>
      <div class="stat">
        <span class="stat-label">Energy</span>
        <span class="stat-value" id="energy-level">0%</span>
      </div>
    </div>
  </header>

  <aside class="controls" aria-label="Visual controls">
    <button type="button" class="control-btn active" data-mode="nebula" aria-pressed="true">
      <span class="control-icon">✦</span>
      Nebula
    </button>
    <button type="button" class="control-btn" data-mode="crystal" aria-pressed="false">
      <span class="control-icon">◇</span>
      Crystal
    </button>
    <button type="button" class="control-btn" data-mode="pulse" aria-pressed="false">
      <span class="control-icon">◎</span>
      Pulse
    </button>
    <button type="button" class="control-btn" data-mode="storm" aria-pressed="false">
      <span class="control-icon">⚡</span>
      Storm
    </button>
  </aside>

  <footer class="hint">
    <p id="hint-text">
      <span class="desktop-hint">Click anywhere to send ripples · Drag to orbit · Scroll to zoom</span>
      <span class="touch-hint">Tap to pulse · Drag to spin · Pinch to zoom</span>
    </p>
  </footer>

  <div class="ripple-layer" id="ripple-layer" aria-hidden="true"></div>

  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
    }
  }
  </script>
  <script type="module" src="script.js"></script>
</body>
</html>
